name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
          - system: aarch64-darwin
          - system: x86_64-darwin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download viewer binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p libexec/zat
          viewers=("zat-js-viewer" "zat-rust-viewer" "zat-python-viewer")
          for viewer in "${viewers[@]}"; do
            rev=$(jq -r ".nodes.\"$viewer\".locked.rev" flake.lock)
            owner=$(jq -r ".nodes.\"$viewer\".locked.owner" flake.lock)
            repo=$(jq -r ".nodes.\"$viewer\".locked.repo" flake.lock)
            tag=$(gh api "repos/$owner/$repo/git/matching-refs/tags/" --jq \
              ".[] | select(.object.sha == \"$rev\" or .object.sha == null) | .ref" | head -1)
            if [ -z "$tag" ]; then
              # Check if any tag points to this commit via annotated tag objects
              tag=$(gh api "repos/$owner/$repo/tags" --jq \
                ".[] | select(.commit.sha == \"$rev\") | \"refs/tags/\" + .name" | head -1)
            fi
            if [ -z "$tag" ]; then
              echo "ERROR: No release tag found for $viewer at commit $rev"
              exit 1
            fi
            tag_name="${tag#refs/tags/}"
            echo "Using $viewer $tag_name (commit $rev)"
            gh release download "$tag_name" --repo "$owner/$repo" \
              --pattern "${viewer}-${{ matrix.system }}.tar.gz" --dir /tmp
            tar --no-overwrite-dir -xzf "/tmp/${viewer}-${{ matrix.system }}.tar.gz" -C libexec/zat
          done

      - name: Package tarball
        run: |
          mkdir -p pkg/bin pkg/libexec
          install -m 755 bin/zat.sh pkg/bin/zat
          cp -r libexec/zat pkg/libexec/zat
          tar -czvf "zat-${{ matrix.system }}.tar.gz" -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zat-${{ matrix.system }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"*.tar.gz release/
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for release assets
        run: sleep 10

      - name: Download release assets and calculate SHA256
        id: sha
        run: |
          mkdir -p assets

          curl -L -o assets/zat-aarch64-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-aarch64-darwin.tar.gz"
          curl -L -o assets/zat-x86_64-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-x86_64-darwin.tar.gz"
          curl -L -o assets/zat-x86_64-linux.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-x86_64-linux.tar.gz"

          echo "sha256_aarch64_darwin=$(sha256sum assets/zat-aarch64-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha256_x86_64_darwin=$(sha256sum assets/zat-x86_64-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha256_x86_64_linux=$(sha256sum assets/zat-x86_64-linux.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          mkdir -p Formula
          cat > Formula/zat.rb << 'FORMULA'
          class Zat < Formula
            desc "Code outline viewer for LLMs"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-aarch64-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha256_aarch64_darwin }}"
              end
              on_intel do
                url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-x86_64-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha256_x86_64_darwin }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zat-x86_64-linux.tar.gz"
                sha256 "${{ steps.sha.outputs.sha256_x86_64_linux }}"
              end
            end

            def install
              bin.install "bin/zat"
              libexec.install Dir["libexec/zat"]
            end

            test do
              (testpath/"test.ts").write("export function hello(): string { return 'hi'; }\n")
              assert_match "function hello", shell_output("#{bin}/zat #{testpath}/test.ts")
            end
          end
          FORMULA

      - name: Push to Homebrew tap
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source-directory: Formula
          destination-github-username: ${{ github.repository_owner }}
          destination-repository-name: homebrew-tap
          target-branch: main
          target-directory: Formula
          commit-message: "zat ${{ steps.version.outputs.version }}"
          user-email: github-actions[bot]@users.noreply.github.com
          user-name: github-actions[bot]
          create-target-branch-if-needed: true
