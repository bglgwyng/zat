name: Update llm-agents.nix

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update (e.g. 0.5.2)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Clone llm-agents.nix
        run: git clone https://github.com/numtide/llm-agents.nix.git

      - name: Update zat
        working-directory: llm-agents.nix
        run: nix-update --flake --version=${{ steps.version.outputs.version }} zat

      - name: Verify build
        working-directory: llm-agents.nix
        run: nix build .#zat

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          path: llm-agents.nix
          token: ${{ secrets.LLM_AGENTS_NIX_TOKEN }}
          commit-message: "zat: ${{ steps.version.outputs.version }}"
          title: "zat: ${{ steps.version.outputs.version }}"
          body: |
            ## Summary

            Update zat to ${{ steps.version.outputs.version }} (release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})

            ## Test plan

            - [x] `nix build .#zat` succeeds
          branch: update-zat-${{ steps.version.outputs.version }}
          push-to-fork: ${{ github.repository_owner }}/llm-agents.nix
